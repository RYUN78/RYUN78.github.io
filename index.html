<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>みどり亭 モバイルオーダー</title>
<style>
/* ===========================
   リセット・ベース
=========================== */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
  background: #e8e8e8;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}
#app {
  width: 390px;
  min-height: 844px;
  background: #fff;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.18);
}

/* ===========================
   共通画面
=========================== */
.screen {
  width: 100%;
  min-height: 844px;
  display: flex;
  flex-direction: column;
}

/* ===========================
   入店画面 (Slide 1)
=========================== */
.screen-checkin {
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px 32px;
  background: #fff;
}
.checkin-title {
  font-size: 22px;
  font-weight: 700;
  color: #1a1a1a;
  text-align: center;
}
.checkin-subtitle {
  font-size: 15px;
  color: #555;
  text-align: center;
}
.checkin-row {
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 16px;
}
.checkin-label {
  width: 48px;
  font-size: 15px;
}
.count-box {
  width: 52px;
  height: 40px;
  border: 1.5px solid #aaa;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  font-weight: 600;
}

/* ===========================
   ボタン共通
=========================== */
.round-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1.5px solid #888;
  background: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.1s;
}
.round-btn:active { background: #eee; }
.round-btn.lg { width: 48px; height: 48px; font-size: 22px; }

.primary-btn {
  background: #3a3a3a;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 13px 28px;
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  min-width: 120px;
  transition: background 0.15s;
}
.primary-btn:active { background: #222; }
.primary-btn.disabled { background: #bbb; cursor: default; }

.secondary-btn {
  background: #f0f0f0;
  color: #333;
  border: 1px solid #ccc;
  border-radius: 8px;
  padding: 13px 28px;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  min-width: 100px;
  transition: background 0.15s;
}
.secondary-btn:active { background: #ddd; }

/* ===========================
   メニュー画面 (Slide 2)
=========================== */
.screen-menu {
  flex-direction: row;
  height: 844px;
}
.menu-sidebar {
  width: 72px;
  background: #f5f5f5;
  border-right: 1px solid #ddd;
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  flex-shrink: 0;
}
.cat-tab {
  padding: 10px 4px;
  font-size: 10px;
  text-align: center;
  cursor: pointer;
  color: #555;
  border-bottom: 1px solid #e0e0e0;
  line-height: 1.3;
  transition: background 0.1s;
}
.cat-tab:active { background: #e0e0e0; }
.cat-tab.active {
  background: #fff;
  color: #c0392b;
  font-weight: 700;
  border-right: 3px solid #c0392b;
}

.menu-main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  position: relative;
}
.menu-items {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.menu-items.dimmed { filter: brightness(0.6); pointer-events: none; }
.menu-item-card {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 10px;
  padding: 10px 12px;
  cursor: pointer;
  transition: background 0.1s;
}
.menu-item-card:active { background: #f5f5f5; }
.menu-item-emoji { font-size: 28px; flex-shrink: 0; }
.menu-item-name { font-size: 14px; font-weight: 600; color: #1a1a1a; }
.menu-item-desc { font-size: 11px; color: #888; margin-top: 2px; }
.menu-item-price { font-size: 13px; color: #c0392b; font-weight: 500; margin-top: 3px; }

.menu-footer {
  display: flex;
  border-top: 1px solid #ddd;
  background: #fafafa;
  flex-shrink: 0;
}
.footer-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 8px 4px;
  border: none;
  background: none;
  cursor: pointer;
  font-size: 11px;
  color: #444;
  border-right: 1px solid #eee;
  position: relative;
  transition: background 0.1s;
}
.footer-btn:last-child { border-right: none; }
.footer-btn:active { background: #eee; }
.footer-icon { font-size: 20px; }
.footer-label { font-size: 10px; margin-top: 2px; line-height: 1.2; text-align: center; }
.cart-badge {
  position: absolute;
  top: 4px; right: 14px;
  background: #e74c3c;
  color: #fff;
  border-radius: 50%;
  width: 16px; height: 16px;
  font-size: 10px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700;
}

/* ===========================
   数量選択オーバーレイ (Slide 3)
=========================== */
.qty-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 50px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.35);
  z-index: 10;
}
.qty-modal {
  background: #fff;
  border-radius: 14px;
  padding: 24px 28px;
  width: 240px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.qty-modal-title { font-size: 14px; color: #555; }
.qty-modal-item { font-size: 15px; font-weight: 700; color: #1a1a1a; }
.qty-ctrl {
  display: flex;
  align-items: center;
  gap: 20px;
}
.qty-val {
  font-size: 28px;
  font-weight: 700;
  min-width: 36px;
  text-align: center;
}
.qty-actions {
  display: flex;
  gap: 12px;
}

/* ===========================
   カートオーバーレイ (Slide 4)
=========================== */
.cart-modal {
  background: #fff;
  border-radius: 14px;
  padding: 20px;
  width: 280px;
  max-height: 520px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.cart-modal-title {
  font-size: 16px;
  font-weight: 700;
  text-align: center;
  color: #1a1a1a;
  border-bottom: 1px solid #eee;
  padding-bottom: 8px;
}
.cart-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.cart-empty { font-size: 13px; color: #aaa; text-align: center; padding: 20px; }
.cart-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 4px 0;
  border-bottom: 1px solid #f0f0f0;
}
.cart-row-name { font-size: 13px; color: #1a1a1a; flex: 1; }
.cart-qty-ctrl {
  display: flex;
  align-items: center;
  gap: 8px;
}
.qty-btn {
  width: 26px; height: 26px;
  border-radius: 50%;
  border: 1px solid #bbb;
  background: #fff;
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.qty-num { font-size: 14px; font-weight: 600; min-width: 18px; text-align: center; }
.cart-actions {
  display: flex;
  gap: 10px;
  justify-content: center;
}

/* ===========================
   トースト (Slide 5/6)
=========================== */
.toast-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 50px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.4);
  z-index: 10;
}
.toast-box {
  background: rgba(255,255,255,0.97);
  border-radius: 18px;
  padding: 32px 40px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  box-shadow: 0 8px 32px rgba(0,0,0,0.2);
}
.toast-icon { font-size: 40px; }
.toast-msg { font-size: 18px; font-weight: 700; color: #1a1a1a; text-align: center; line-height: 1.5; }

/* ===========================
   注文履歴 (Slide 7)
=========================== */
.screen-history {
  padding: 0;
  background: #f5f5f5;
}
.history-header {
  background: #3a3a3a;
  color: #fff;
  font-size: 18px;
  font-weight: 700;
  padding: 16px 20px;
  text-align: center;
}
.history-list {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.history-empty { font-size: 14px; color: #aaa; text-align: center; padding: 40px; }
.history-row {
  display: flex;
  align-items: center;
  background: #fff;
  border-radius: 8px;
  padding: 10px 14px;
  gap: 8px;
}
.history-name { flex: 1; font-size: 14px; color: #1a1a1a; }
.history-qty { font-size: 13px; color: #555; width: 36px; text-align: right; }
.history-price { font-size: 13px; color: #c0392b; width: 70px; text-align: right; }
.history-total {
  display: flex;
  justify-content: space-between;
  background: #3a3a3a;
  color: #fff;
  padding: 14px 20px;
  font-size: 15px;
  font-weight: 700;
  margin: 8px 12px;
  border-radius: 8px;
}
.screen-history .primary-btn {
  margin: 12px auto 24px;
  display: block;
}

/* ===========================
   呼び出し・会計 (Slide 8)
=========================== */
.screen-call {
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 60px 40px;
  background: #fff;
}
.call-big-btn {
  width: 100%;
  padding: 24px;
  font-size: 20px;
  font-weight: 700;
  border: 2px solid #aaa;
  border-radius: 12px;
  background: #fff;
  cursor: pointer;
  transition: background 0.1s;
}
.call-big-btn:active { background: #f0f0f0; }
.checkout-card {
  background: #f9f9f9;
  border: 1.5px solid #ddd;
  border-radius: 14px;
  padding: 28px 24px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 12px;
  align-items: center;
  text-align: center;
}
.checkout-table { font-size: 18px; font-weight: 700; color: #333; }
.checkout-amount { font-size: 22px; font-weight: 700; color: #c0392b; }
.checkout-thanks { font-size: 14px; color: #555; line-height: 1.6; }

/* ===========================
   呼び出し中 (Slide 9)
=========================== */
.screen-calling {
  background: #fff;
  padding: 0;
}
.calling-title {
  background: #3a3a3a;
  color: #fff;
  font-size: 17px;
  font-weight: 700;
  padding: 14px 20px;
  text-align: center;
}
.calling-tabs {
  display: flex;
  border-bottom: 1px solid #ddd;
}
.calling-tab {
  flex: 1;
  padding: 10px 4px;
  font-size: 11px;
  text-align: center;
  color: #888;
  cursor: default;
}
.calling-tab.active {
  color: #1a1a1a;
  font-weight: 700;
  border-bottom: 2px solid #3a3a3a;
}
.calling-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 60px 32px;
}
.calling-icon { font-size: 80px; }
.calling-msg {
  font-size: 16px;
  color: #333;
  text-align: center;
  line-height: 1.8;
  background: #f5f5f5;
  border-radius: 12px;
  padding: 20px 28px;
}
.screen-calling .secondary-btn {
  margin: 20px auto 40px;
  display: block;
}

/* ===========================
   エラー画面 (Slide 11)
=========================== */
.screen-error {
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 60px 40px;
  background: #f5f5f5;
}
.error-code {
  font-size: 28px;
  font-weight: 700;
  color: #888;
  background: #ddd;
  padding: 10px 24px;
  border-radius: 8px;
}
.error-title {
  font-size: 20px;
  font-weight: 700;
  color: #c0392b;
}
</style>
</head>

const CATEGORIES = Object.keys(MENU_DATA);
// ===========================
// 画面テンプレート群
// ===========================

// Slide 1: 入店画面
function screenCheckin() {
  return `
    <div class="screen screen-checkin">
      <div class="checkin-title">みどり亭へようこそ</div>
      <div class="checkin-subtitle">人数を入力してください</div>

      <button class="primary-btn" id="btn-checkin">確定する</button>
    </div>

}

// Slide 2: メニュー画面（ベース）
function screenMenu() {
  const items = MENU_DATA[state.currentCategory] || [];
  return `
    <div class="screen screen-menu">
      <div class="menu-sidebar">
        ${CATEGORIES.map(cat => `
          <div class="cat-tab${cat === state.currentCategory ? ' active' : ''}" data-cat="${cat}">${cat}</div>
        `).join('')}
      </div>
      <div class="menu-main">
        <div class="menu-items" id="menu-items">
          ${items.map(item => `
            <div class="menu-item-card" data-id="${item.id}">
              <div class="menu-item-emoji">${item.img}</div>
              <div class="menu-item-info">
                <div class="menu-item-name">${item.name}</div>
                ${item.desc ? `<div class="menu-item-desc">${item.desc}</div>` : ''}
                <div class="menu-item-price">¥${item.price.toLocaleString()}（税込）</div>
              </div>
            </div>
          `).join('')}
        </div>
        <div class="menu-footer">
          <button class="footer-btn" id="btn-call-checkout">
            <span class="footer-icon">🔔</span>
            <span class="footer-label">呼び出し・会計</span>
          </button>
          <button class="footer-btn" id="btn-history">
            <span class="footer-icon">📄</span>
            <span class="footer-label">注文履歴</span>
          </button>
          <button class="footer-btn${state.cart.length > 0 ? ' has-badge' : ''}" id="btn-cart">
            <span class="footer-icon">🛒</span>
            <span class="footer-label">カートを確認</span>
            ${state.cart.length > 0 ? `<span class="cart-badge">${state.cart.reduce((s,c)=>s+c.qty,0)}</span>` : ''}
          </button>
        </div>
      </div>
    </div>
  `;
}

// Slide 3: 数量選択（モーダル風）
function screenQtySelect() {
  const item = state.selectedItem;
  return `
    <div class="screen screen-menu">
      <div class="menu-sidebar">
        ${CATEGORIES.map(cat => `
          <div class="cat-tab${cat === state.currentCategory ? ' active' : ''}" data-cat="${cat}">${cat}</div>
        `).join('')}
      </div>
      <div class="menu-main">
        <div class="menu-items dimmed">
          ${(MENU_DATA[state.currentCategory] || []).map(i => `
            <div class="menu-item-card" data-id="${i.id}">
              <div class="menu-item-emoji">${i.img}</div>
              <div class="menu-item-info">
                <div class="menu-item-name">${i.name}</div>
                <div class="menu-item-price">¥${i.price.toLocaleString()}（税込）</div>
              </div>
            </div>
          `).join('')}
        </div>

function screenError(code = '') {

    </div>
  `;
}
// ===========================
// アプリ状態管理
// ===========================
const state = {
  screen: 'checkin',       // 現在の画面
  adults: 0,
  children: 0,
  customerId: null,        // 入店後に発行
  tableNo: null,
  currentCategory: 'おすすめ',
  cart: [],                // {item, qty}
  orders: [],              // 確定済み注文 {item, qty, time}
  selectedItem: null,      // 数量選択中のアイテム
  selectedQty: 1,
  callMode: null,          // 'call' | 'checkout'
  checkoutData: null,      // 会計表示用
};

// ===========================
// 画面遷移
// ===========================
function goto(screen) {
  state.screen = screen;
  render();
}

// ===========================
// 入店処理
// ===========================
function checkin() {
  if (state.adults === 0 && state.children === 0) {
    alert('人数を入力してください');
    return;
  }
  // 顧客ID発行（7桁ゼロパディング）
  state.customerId = String(Math.floor(Math.random() * 9999999)).padStart(7, '0');
  state.tableNo = document.querySelector('#table-no')?.value || '3';
  goto('menu');
}

// ===========================
// カート操作
// ===========================
function addToCart(item, qty) {
  const existing = state.cart.find(c => c.item.id === item.id);
  if (existing) {
    existing.qty += qty;
  } else {
    state.cart.push({ item, qty });
  }
}

function updateCartQty(itemId, delta) {
  const entry = state.cart.find(c => c.item.id === itemId);
  if (!entry) return;
  entry.qty = Math.max(0, entry.qty + delta);
  if (entry.qty === 0) state.cart = state.cart.filter(c => c.item.id !== itemId);
  renderCart();
}

function confirmOrder() {
  if (state.cart.length === 0) return;
  const now = new Date().toISOString();
  state.cart.forEach(c => state.orders.push({ ...c, time: now }));
  state.cart = [];
  goto('order_confirmed');
  setTimeout(() => goto('menu'), 2000);
}

function cartTotal() {
  return state.cart.reduce((s, c) => s + c.item.price * c.qty, 0);
}

function ordersTotal() {
  return state.orders.reduce((s, c) => s + c.item.price * c.qty, 0);
}

// ===========================
// 画面レンダラー
// ===========================
function render() {
  const app = document.getElementById('app');
  switch (state.screen) {
    case 'checkin':        app.innerHTML = screenCheckin();        break;
    case 'menu':           app.innerHTML = screenMenu();           break;
    case 'qty_select':     app.innerHTML = screenQtySelect();      break;
    case 'item_added':     app.innerHTML = screenItemAdded();      break;
    case 'cart':           app.innerHTML = screenCart();           break;
    case 'order_confirmed':app.innerHTML = screenOrderConfirmed(); break;
    case 'history':        app.innerHTML = screenHistory();        break;
    case 'call_checkout':  app.innerHTML = screenCallCheckout();   break;
    case 'calling':        app.innerHTML = screenCalling();        break;
    case 'checkout_confirm':app.innerHTML = screenCheckoutConfirm(); break;
    case 'error':          app.innerHTML = screenError();          break;
    default:               app.innerHTML = screenError();
  }
  attachEvents();
}

// ===========================
// イベント登録（render後に呼ぶ）
// ===========================
function attachEvents() {
  // 入店画面
  document.getElementById('btn-checkin')?.addEventListener('click', checkin);
  document.getElementById('btn-adults-plus')?.addEventListener('click', () => { state.adults++; updateCheckinCount(); });
  document.getElementById('btn-adults-minus')?.addEventListener('click', () => { state.adults = Math.max(0, state.adults-1); updateCheckinCount(); });
  document.getElementById('btn-children-plus')?.addEventListener('click', () => { state.children++; updateCheckinCount(); });
  document.getElementById('btn-children-minus')?.addEventListener('click', () => { state.children = Math.max(0, state.children-1); updateCheckinCount(); });

  // カテゴリタブ
  document.querySelectorAll('.cat-tab').forEach(el => {
    el.addEventListener('click', () => {
      state.currentCategory = el.dataset.cat;
      renderMenuContent();
      document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    });
  });

  // メニューアイテム
  document.querySelectorAll('.menu-item-card').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.id);
      const cat = MENU_DATA[state.currentCategory];
      state.selectedItem = cat.find(i => i.id === id);
      state.selectedQty = 1;
      goto('qty_select');
    });
  });

  // 数量選択
  document.getElementById('btn-qty-plus')?.addEventListener('click', () => { state.selectedQty++; document.getElementById('qty-val').textContent = state.selectedQty; });
  document.getElementById('btn-qty-minus')?.addEventListener('click', () => { state.selectedQty = Math.max(1, state.selectedQty-1); document.getElementById('qty-val').textContent = state.selectedQty; });
  document.getElementById('btn-qty-confirm')?.addEventListener('click', () => {
    addToCart(state.selectedItem, state.selectedQty);
    goto('item_added');
    setTimeout(() => goto('menu'), 1500);
  });
  document.getElementById('btn-qty-back')?.addEventListener('click', () => goto('menu'));

  // カート画面
  document.getElementById('btn-cart-close')?.addEventListener('click', () => goto('menu'));
  document.getElementById('btn-order-confirm')?.addEventListener('click', confirmOrder);
  document.querySelectorAll('.cart-qty-plus').forEach(el => {
    el.addEventListener('click', () => { updateCartQty(parseInt(el.dataset.id), 1); });
  });
  document.querySelectorAll('.cart-qty-minus').forEach(el => {
    el.addEventListener('click', () => { updateCartQty(parseInt(el.dataset.id), -1); });
  });

  // フッターアイコン
  document.getElementById('btn-call-checkout')?.addEventListener('click', () => goto('call_checkout'));
  document.getElementById('btn-history')?.addEventListener('click', () => goto('history'));
  document.getElementById('btn-cart')?.addEventListener('click', () => goto('cart'));

  // 注文履歴
  document.getElementById('btn-history-back')?.addEventListener('click', () => goto('menu'));

  // 呼び出し・会計
  document.getElementById('btn-call')?.addEventListener('click', () => { state.callMode = 'call'; goto('calling'); });
  document.getElementById('btn-checkout')?.addEventListener('click', () => {
    state.checkoutData = { tableNo: state.tableNo || '3', total: ordersTotal() };
    goto('checkout_confirm');
  });
  document.getElementById('btn-call-checkout-back')?.addEventListener('click', () => goto('menu'));

  // 呼び出し中
  document.getElementById('btn-calling-cancel')?.addEventListener('click', () => goto('menu'));

  // 会計確認
  document.getElementById('btn-checkout-yes')?.addEventListener('click', () => goto('menu'));
}

function updateCheckinCount() {
  const a = document.getElementById('adults-count');
  const c = document.getElementById('children-count');
  if (a) a.textContent = state.adults;
  if (c) c.textContent = state.children;
}

function renderMenuContent() {
  const el = document.getElementById('menu-items');
  if (!el) return;
  const items = MENU_DATA[state.currentCategory] || [];
  el.innerHTML = items.map(item => `
    <div class="menu-item-card" data-id="${item.id}">
      <div class="menu-item-emoji">${item.img}</div>
      <div class="menu-item-info">
        <div class="menu-item-name">${item.name}</div>
        ${item.desc ? `<div class="menu-item-desc">${item.desc}</div>` : ''}
        <div class="menu-item-price">¥${item.price.toLocaleString()}（税込）</div>
      </div>
    </div>
  `).join('');
  // イベント再登録
  document.querySelectorAll('.menu-item-card').forEach(el => {
    el.addEventListener('click', () => {
      const id = parseInt(el.dataset.id);
      const cat = MENU_DATA[state.currentCategory];
      state.selectedItem = cat.find(i => i.id === id);
      state.selectedQty = 1;
      goto('qty_select');
    });
  });
}

function renderCart() {
  const el = document.getElementById('cart-list');
  if (!el) return;
  el.innerHTML = state.cart.map(c => `
    <div class="cart-row">
      <div class="cart-row-name">${c.item.name}</div>
      <div class="cart-qty-ctrl">
        <button class="qty-btn cart-qty-minus" data-id="${c.item.id}">⊖</button>
        <span class="qty-num">${c.qty}</span>
        <button class="qty-btn cart-qty-plus" data-id="${c.item.id}">⊕</button>
      </div>
    </div>
  `).join('');
  const totalEl = document.getElementById('cart-total');
  if (totalEl) totalEl.textContent = `¥${cartTotal().toLocaleString()}`;
  document.querySelectorAll('.cart-qty-plus').forEach(el => {
    el.addEventListener('click', () => { updateCartQty(parseInt(el.dataset.id), 1); });
  });
  document.querySelectorAll('.cart-qty-minus').forEach(el => {
    el.addEventListener('click', () => { updateCartQty(parseInt(el.dataset.id), -1); });
  });
}
render();
</script>
